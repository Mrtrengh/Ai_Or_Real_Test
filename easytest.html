<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI vs Gerçek - Test</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff3366;
            --secondary-color: #00d9ff;
            --dark-bg: #0a0e27;
            --light-text: #e8eaf6;
        }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--dark-bg);
            color: var(--light-text);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .test-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .test-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .test-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        
        .difficulty-badge {
            display: inline-block;
            padding: 10px 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .score-board {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--secondary-color);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-item .label {
            font-size: 0.9rem;
            color: rgba(232, 234, 246, 0.7);
            margin-bottom: 5px;
        }
        
        .score-item .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary-color);
        }
        
        .images-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .image-box {
            background: rgba(255, 255, 255, 0.03);
            border: 3px solid rgba(255, 51, 102, 0.3);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .image-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        
        .image-box:hover::before {
            opacity: 0.3;
        }
        
        .image-box:hover {
            transform: scale(1.02);
            border-color: var(--secondary-color);
        }
        
        .image-box.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .image-box.correct {
            border-color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }
        
        .image-box.wrong {
            border-color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        
        .image-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-label {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--light-text);
        }
        
        .result-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .result-badge.show {
            opacity: 1;
        }
        
        .result-badge.correct {
            color: #00ff00;
            border: 3px solid #00ff00;
        }
        
        .result-badge.wrong {
            color: #ff0000;
            border: 3px solid #ff0000;
        }

        .instruction {
            text-align: center;
            font-size: 1.1rem;
            color: var(--secondary-color);
            margin-bottom: 30px;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .images-container {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .test-header h1 {
                font-size: 2rem;
            }
            
            .image-wrapper {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <!-- Test Başlığı -->
        <div class="test-header">
            <div class="difficulty-badge">AI FOTOĞRAF TANI</div>
            <h1>Hangisi AI?</h1>
            <p class="instruction">🎯 AI ile üretilmiş fotoğrafı seçin</p>
        </div>
        
        <!-- Skor Tablosu -->
        <div class="score-board">
            <div class="score-item">
                <div class="label">Soru</div>
                <div class="value" id="questionNumber">1/15</div>
            </div>
            <div class="score-item">
                <div class="label">Doğru</div>
                <div class="value" id="correctCount">0</div>
            </div>
            <div class="score-item">
                <div class="label">Yanlış</div>
                <div class="value" id="wrongCount">0</div>
            </div>
        </div>
        
        <!-- Fotoğraflar -->
        <div class="images-container">
            <!-- Sol Fotoğraf -->
            <div class="image-box" id="leftBox">
                <div class="image-wrapper">
                    <img id="leftImage" src="" alt="Fotoğraf 1">
                    <div class="result-badge" id="leftBadge"></div>
                </div>
                <div class="image-label">Fotoğraf A</div>
            </div>
            
            <!-- Sağ Fotoğraf -->
            <div class="image-box" id="rightBox">
                <div class="image-wrapper">
                    <img id="rightImage" src="" alt="Fotoğraf 2">
                    <div class="result-badge" id="rightBadge"></div>
                </div>
                <div class="image-label">Fotoğraf B</div>
            </div>
        </div>
    </div>
    
    <script>
        // ==============================================
        // FOTOĞRAF KATALOGLARİ
        // ==============================================
        
        // AI ile üretilmiş fotoğraflar
        const aiPhotos = [
            'https://images.unsplash.com/photo-1707343843437-caacff5cfa74?w=600',
            'https://images.unsplash.com/photo-1707343843982-f8275f3994c5?w=600',
            'https://images.unsplash.com/photo-1707343844152-6d33a0bb32c3?w=600',
            'https://images.unsplash.com/photo-1682695795557-17447f921f79?w=600',
            'https://images.unsplash.com/photo-1682687982501-1e58ab814714?w=600',
            'https://images.unsplash.com/photo-1682686581498-5e85c7228119?w=600',
            'https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=600',
            'https://images.unsplash.com/photo-1682687220640-b6f1f954d967?w=600',
            'https://images.unsplash.com/photo-1682687220063-4742bd7fd538?w=600',
            'https://images.unsplash.com/photo-1682687220923-c58b9a4592ae?w=600',
            'https://images.unsplash.com/photo-1682687221248-3116ba6ab483?w=600',
            'https://images.unsplash.com/photo-1682687220208-22d7a2543e88?w=600',
            'https://images.unsplash.com/photo-1682687220199-d0124f48f95b?w=600',
            'https://images.unsplash.com/photo-1682687221038-404cb8830901?w=600',
            'https://images.unsplash.com/photo-1682687221080-5cb261c645cb?w=600'
        ];
        
        // Gerçek fotoğraflar
        const realPhotos = [
            'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600',
            'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600',
            'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=600',
            'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600',
            'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=600',
            'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=600',
            'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600',
            'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600',
            'https://images.unsplash.com/photo-1504893524553-b855bce32c67?w=600',
            'https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=600',
            'https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=600',
            'https://images.unsplash.com/photo-1425082661705-1834bfd09dca?w=600',
            'https://images.unsplash.com/photo-1445404590072-16ef9c18bd83?w=600',
            'https://images.unsplash.com/photo-1514984879728-be0aff75a6e8?w=600'
        ];
        
        // ==============================================
        // OYUN DEĞİŞKENLERİ
        // ==============================================
        
        const MAX_QUESTIONS = 15; // Maksimum soru sayısı
        
        let currentQuestion = 1;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let currentCorrectSide = null;
        let isAnswering = false;
        
        // Kullanılmış fotoğraf indeksleri
        let usedAiPhotos = [];
        let usedRealPhotos = [];
        
        // DOM Elementleri
        const leftBox = document.getElementById('leftBox');
        const rightBox = document.getElementById('rightBox');
        const leftImage = document.getElementById('leftImage');
        const rightImage = document.getElementById('rightImage');
        const leftBadge = document.getElementById('leftBadge');
        const rightBadge = document.getElementById('rightBadge');
        const questionNumber = document.getElementById('questionNumber');
        const correctCount = document.getElementById('correctCount');
        const wrongCount = document.getElementById('wrongCount');
        
        // ==============================================
        // RASTGELE FOTOĞRAF SEÇME FONKSİYONU
        // ==============================================
        
        function getRandomPhoto(array, usedIndices) {
            // Tüm fotoğraflar kullanıldıysa, listeyi sıfırla
            if (usedIndices.length >= array.length) {
                usedIndices.length = 0;
            }
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * array.length);
            } while (usedIndices.includes(randomIndex));
            
            usedIndices.push(randomIndex);
            
            return array[randomIndex];
        }
        
        // ==============================================
        // YENİ SORU YÜKLEME FONKSİYONU
        // ==============================================
        
        function loadNewQuestion() {
            // Rastgele bir gerçek ve bir AI fotoğraf seç
            const realPhoto = getRandomPhoto(realPhotos, usedRealPhotos);
            const aiPhoto = getRandomPhoto(aiPhotos, usedAiPhotos);
            
            // Rastgele olarak hangi tarafta AI fotoğraf olacağını belirle
            // 0 veya 1 rastgele seç
            const randomSide = Math.floor(Math.random() * 2);
            
            if (randomSide === 0) {
                // AI fotoğraf solda (0)
                leftImage.src = aiPhoto;
                rightImage.src = realPhoto;
                currentCorrectSide = 'left';
                console.log('AI SOLDA');
            } else {
                // AI fotoğraf sağda (1)
                leftImage.src = realPhoto;
                rightImage.src = aiPhoto;
                currentCorrectSide = 'right';
                console.log('AI SAĞDA');
            }
            
            // Görsel efektleri sıfırla
            leftBox.classList.remove('correct', 'wrong', 'disabled');
            rightBox.classList.remove('correct', 'wrong', 'disabled');
            leftBadge.classList.remove('show', 'correct', 'wrong');
            rightBadge.classList.remove('show', 'correct', 'wrong');
            
            // Skor tahtasını güncelle
            questionNumber.textContent = currentQuestion + '/' + MAX_QUESTIONS;
            
            isAnswering = false;
            
            console.log('Yeni soru #' + currentQuestion + ' - AI fotoğraf tarafı:', currentCorrectSide);
        }
        
        // ==============================================
        // CEVAP KONTROLÜ VE YENİ SORU
        // ==============================================
        
        function handleAnswer(selectedSide) {
            if (isAnswering) return;
            
            isAnswering = true;
            
            // Kutuları tıklanamaz yap
            leftBox.classList.add('disabled');
            rightBox.classList.add('disabled');
            
            // Cevabı kontrol et (AI'yı bulmak amaç)
            const isCorrect = selectedSide === currentCorrectSide;
            
            if (isCorrect) {
                correctAnswers++;
                correctCount.textContent = correctAnswers;
                
                // Doğru cevap görseli
                if (selectedSide === 'left') {
                    leftBox.classList.add('correct');
                    leftBadge.textContent = '✓ AI!';
                    leftBadge.classList.add('show', 'correct');
                    
                    rightBox.classList.add('wrong');
                    rightBadge.textContent = 'GERÇEK';
                    rightBadge.classList.add('show', 'wrong');
                } else {
                    rightBox.classList.add('correct');
                    rightBadge.textContent = '✓ AI!';
                    rightBadge.classList.add('show', 'correct');
                    
                    leftBox.classList.add('wrong');
                    leftBadge.textContent = 'GERÇEK';
                    leftBadge.classList.add('show', 'wrong');
                }
            } else {
                wrongAnswers++;
                wrongCount.textContent = wrongAnswers;
                
                // Yanlış cevap görseli
                if (selectedSide === 'left') {
                    leftBox.classList.add('wrong');
                    leftBadge.textContent = '✗ GERÇEK';
                    leftBadge.classList.add('show', 'wrong');
                    
                    rightBox.classList.add('correct');
                    rightBadge.textContent = 'AI!';
                    rightBadge.classList.add('show', 'correct');
                } else {
                    rightBox.classList.add('wrong');
                    rightBadge.textContent = '✗ GERÇEK';
                    rightBadge.classList.add('show', 'wrong');
                    
                    leftBox.classList.add('correct');
                    leftBadge.textContent = 'AI!';
                    leftBadge.classList.add('show', 'correct');
                }
            }
            
            // 15 soru tamamlandıysa test bitti
            if (currentQuestion >= MAX_QUESTIONS) {
                setTimeout(() => {
                    showResults();
                }, 1500);
                return;
            }
            
            // Soru sayısını artır
            currentQuestion++;
            
            // 1.5 saniye sonra yeni soru yükle
            setTimeout(() => {
                loadNewQuestion();
            }, 1500);
        }
        
        // ==============================================
        // TEST SONUÇLARINI GÖSTER
        // ==============================================
        
        function showResults() {
            const percentage = Math.round((correctAnswers / MAX_QUESTIONS) * 100);
            
            let performanceMessage = '';
            if (percentage >= 80) {
                performanceMessage = '🌟 Mükemmel! AI uzmanısın!';
            } else if (percentage >= 60) {
                performanceMessage = '👍 İyi iş! Gelişiyorsun!';
            } else if (percentage >= 40) {
                performanceMessage = '💪 Fena değil, biraz daha pratik yap!';
            } else {
                performanceMessage = '🎯 Devam et, pratik yapman gerek!';
            }
            
            alert(`
🎉 TEST TAMAMLANDI! 🎉

📊 SONUÇLAR:
━━━━━━━━━━━━━━━━
Toplam Soru: ${MAX_QUESTIONS}
✅ Doğru: ${correctAnswers}
❌ Yanlış: ${wrongAnswers}
📈 Başarı Oranı: ${percentage}%

${performanceMessage}
            `);
            
            // Testi yeniden başlat
            if (confirm('Testi tekrar yapmak ister misin?')) {
                location.reload();
            }
        }
        
        // ==============================================
        // FOTOĞRAF SEÇİMİ EVENT LİSTENERS
        // ==============================================
        
        leftBox.addEventListener('click', function() {
            if (!isAnswering) {
                handleAnswer('left');
            }
        });
        
        rightBox.addEventListener('click', function() {
            if (!isAnswering) {
                handleAnswer('right');
            }
        });
        
        // ==============================================
        // OYUNU BAŞLAT
        // ==============================================
        
        // Sayfa yüklendiğinde ilk soruyu göster
        window.addEventListener('load', function() {
            loadNewQuestion();
        });
    </script>
</body>
</html>
